# Apache Kafka 3.9 (KRaft) + Kafka UI — Coolify Docker Compose
# Usage:
#   Local:   docker compose -f kafka.yml up -d
#   Coolify: paste this file; set required env vars in Coolify UI.
#
# Coolify auto-generates:
#   - SERVICE_FQDN_KAFKAUI_8080  → public domain for Kafka UI
#   - SERVICE_PASSWORD_KAFKAUI   → admin password (persisted across deploys)
#
# Kafka broker is internal-only (no FQDN). Other stacks reach it on the
# Coolify "Predefined Network" using DNS name `kafka:9092`.
#
# KRaft mode = no ZooKeeper. CLUSTER_ID must be a stable base64 UUID;
# Coolify regenerates it once via SERVICE_BASE64_KAFKACLUSTER and persists it.

x-common: &common
  restart: unless-stopped

services:
  # ──────────────────────────────────────────────
  # Kafka broker (single-node KRaft: combined controller + broker)
  # Two listeners:
  #   INTERNAL  (PLAINTEXT, port 9092) — used by other containers
  #   CONTROLLER (port 9093)           — KRaft quorum, internal only
  # ──────────────────────────────────────────────
  kafka:
    <<: *common
    image: apache/kafka:3.9.0
    expose:
      - "9092"
    environment:
      # Node identity & roles
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: ${SERVICE_BASE64_KAFKACLUSTER}

      # Listeners
      KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # Single-broker safe defaults — override for prod multi-broker
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: ${KAFKA_AUTO_CREATE_TOPICS_ENABLE:-true}

      # Storage
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_LOG_RETENTION_HOURS: ${KAFKA_LOG_RETENTION_HOURS:-168}
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ──────────────────────────────────────────────
  # Kafka UI — web console (provectus)
  # Public via SERVICE_FQDN_KAFKAUI_8080
  # ──────────────────────────────────────────────
  kafka-ui:
    <<: *common
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    expose:
      - "8080"
    environment:
      SERVICE_FQDN_KAFKAUI_8080: ${SERVICE_FQDN_KAFKAUI_8080}
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
      AUTH_TYPE: LOGIN_FORM
      SPRING_SECURITY_USER_NAME: ${KAFKAUI_USER:-admin}
      SPRING_SECURITY_USER_PASSWORD: ${SERVICE_PASSWORD_KAFKAUI}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/actuator/health | grep -q UP || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  kafka-data:
